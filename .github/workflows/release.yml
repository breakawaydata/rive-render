name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # ── Stage 1: Build native binaries ────────────────────────────
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
            artifact: rive-render-darwin-arm64
          - os: macos-13
            platform: darwin
            arch: x64
            artifact: rive-render-darwin-x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            artifact: rive-render-linux-x64
          - os: ubuntu-22.04-arm64
            platform: linux
            arch: arm64
            artifact: rive-render-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone rive-runtime
        run: git clone --depth 1 https://github.com/rive-app/rive-runtime.git deps/rive-runtime

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            python3 \
            libvulkan-dev \
            vulkan-validationlayers \
            glslang-tools

      - name: Build native binary
        run: bash scripts/build-native.sh release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native/out/release/rive_render
          if-no-files-found: error
          retention-days: 1

  # ── Stage 2: Test (Linux x64) ─────────────────────────────────
  test:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            libvulkan-dev \
            ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: rive-render-linux-x64
          path: native/out/release/

      - name: Make binary executable
        run: chmod +x native/out/release/rive_render

      - name: Install and build TypeScript
        working-directory: ts
        run: |
          npm ci
          npm run build

      - name: Run tests
        working-directory: ts
        run: npm test

  # ── Stage 3: Publish ──────────────────────────────────────────
  publish:
    needs: [build-native, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stamp versions
        run: bash scripts/version.sh "${{ steps.version.outputs.version }}"

      # Download all platform binaries
      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: rive-render-darwin-arm64
          path: npm/darwin-arm64/bin/

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: rive-render-darwin-x64
          path: npm/darwin-x64/bin/

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: rive-render-linux-x64
          path: npm/linux-x64/bin/

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: rive-render-linux-arm64
          path: npm/linux-arm64/bin/

      - name: Rename binaries and set permissions
        run: |
          for dir in npm/*/bin/; do
            mv "$dir/rive_render" "$dir/rive-render"
            chmod +x "$dir/rive-render"
          done

      # Publish platform packages first
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in npm/*/; do
            echo "Publishing $(basename "$dir")..."
            npm publish "$dir"
          done

      # Build and publish main TypeScript package
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ts
        run: |
          npm ci
          npm publish

      # Create GitHub Release with binaries
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in npm/*/; do
            platform_arch=$(basename "$dir")
            cp "$dir/bin/rive-render" "release-assets/rive-render-${platform_arch}"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            release-assets/*
